name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '38 11 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: swift
            build-mode: manual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.language == 'swift'
        shell: bash
        run: |
          # Swift autobuild has failed in this repo; build explicitly.
          mapfile -t packages < <(find . -name Package.swift -not -path "./.git/*" -exec dirname {} \;)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No Swift Package.swift files found; nothing to build."
            exit 0
          fi
          for dir in "${packages[@]}"; do
            echo "Building Swift package in: $dir"
            (cd "$dir" && swift build)
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
