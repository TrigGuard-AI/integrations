name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 3 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: autobuild
          - language: python
            build-mode: autobuild
          - language: swift
            build-mode: manual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Swift autobuild fails in this repo; run explicit manual build.
      - name: Build Swift targets (manual)
        if: matrix.language == 'swift'
        run: |
          mapfile -t packages < <(find . -name Package.swift -not -path "./.git/*" -exec dirname {} \;)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No Swift Package.swift files found; nothing to build."
            exit 0
          fi
          for dir in "${packages[@]}"; do
            echo "Building Swift package in: $dir"
            (cd "$dir" && swift build)
          done

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
