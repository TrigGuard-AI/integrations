services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - verifier-service
      - sample-app

  verifier-service:
    build:
      context: ../../
      dockerfile: integrations/nginx-execution-gate/verifier-service/Dockerfile
    expose:
      - "8081"

  sample-app:
    image: hashicorp/http-echo:1.0
    command: ["-listen=:8080", "-text={\"ok\":true,\"backend\":\"sample-app\"}"]
    expose:
      - "8080"
