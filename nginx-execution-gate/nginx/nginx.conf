worker_processes  1;

events { worker_connections  1024; }

http {
  upstream app_backend {
    server sample-app:8080;
  }

  upstream verifier_upstream {
    server verifier-service:8081;
  }

  server {
    listen 8080;

    # Gate all API traffic behind offline receipt verification.
    location /api/ {
      auth_request /verify;
      proxy_pass http://app_backend;
    }

    # Internal auth_request endpoint.
    # Note: auth_request subrequests do not include the original request body by default.
    # This example therefore requires the client to supply the action JSON bytes separately
    # in the TG-Action header (base64-encoded), which the gateway forwards to the verifier.
    location = /verify {
      internal;

      proxy_method POST;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header TG-Execution-Receipt $http_tg_execution_receipt;
      proxy_set_header TG-Surface $http_tg_surface;
      proxy_set_header TG-Action $http_tg_action;
      proxy_set_header TG-Public-Key $http_tg_public_key;
      proxy_pass http://verifier_upstream/verify;
    }

    location / {
      return 200 "ok\n";
    }
  }
}
